[mod-setting-description]
aaii-cc-emotor=Make [item=electric-motor] cost 2/3 of the default. Keep in mind that, in subsequent balancings, [item=electric-motor] is assumed to worth the same as vanilla [item=electronic-circuit].
aaii-cc-multi-cylinder=Give [item=engine-unit] a vanilla-like recipe which is drastically cheaper than AAI default. This makes the progression on Cerys no longer too difficult, and recipes to cast [item=engine-unit] less attractive.
aaii-cc-big-motor=Halve the AAI recipe for [item=electric-engine-unit], which, interestingly, is just the balancing that I need.
aaii-cc-robot-frame=The recipe for [item=flying-robot-frame] is unchanged but the crafting time is reduced to 5s so it is not that painful to craft it.
aaii-cc-mining-time=Undo the changes done by AAI Industry on Nauvis ore mining time factors, so they are all unity again. Toggle this on for slightly improved mental well-being.
aaii-cc-lab=Since [item=lab] is not a big deal in the long run, this is instead balanced around a simple philosophy: [item=burner-lab] and [item=lab] should be made from the left-over materials of [item=automation-science-pack] and [item=logistic-science-pack], respectively, plus [item=stone-brick] and [item=glass]. As such, [item=electronic-circuit] is replaced by [item=electric-motor], and [item=motor] by [item=iron-gear-wheel] + [item=iron-stick].
aaii-cc-burner-backup=For each burner machine that the cheap progression is chosen plus [item=burner-assembling-machine], a backup recipe is created so that they can be crafted with iron on surfaces where there is no wood.
aaii-cc-belt=Revert the recipe of [item=transport-belt] to vanilla. This is actually more reasonable, as [item=transport-belt] is the only item in AAI that is made of [item=motor] but is not burner-powered.
aaii-cc-splitter=Make [item=splitter] less iron-oriented.
aaii-cc-hold-repair-pack=Mainly because the AAI modification breaks the intended material ratio of Eneas.
aaii-cc-concrete-backup=If Crushing Industry is enabled, backup the AAI recipe for [item=concrete] so it can be used on surfaces without iron ore but with iron plate.
aaii-cc-remove-board=Lignumis has some legacy AAI compat code which add [item=basic-circuit-board] to [item=electric-mining-drill], [item=inserter], [item=burner-lab], and [item=assembling-machine-1]. Toggle this option on to undo this.

