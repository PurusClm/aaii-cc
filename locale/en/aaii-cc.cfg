[string-mod-setting-description]
aaii-cc-furnace-mode-default=Select this if this mod should not alter furnce recipes.
aaii-cc-furnace-mode-no-burner=[item=electric-furnace] is restored to its vanilla recipe, while [item=stone-furnace] and [item=steel-furnace] are untouched.
aaii-cc-furnace-mode-cheap=Furnaces still require the earlier version to craft, but the cost is scaled down to match vanilla level.
aaii-cc-inserter-mode-default=Select this if this mod should not alter inserter recipes.
aaii-cc-inserter-mode-no-burner=[item=inserter] no longer requires [item=burner-inserter] and the cost is slightly reduced.\nSelecting this option disables AAI's rebalancing on logistic science pack.
aaii-cc-inserter-mode-cheap=[item=inserter] still requires [item=burner-inserter] to craft, but instead of installing another [item=electric-motor], you only need some [item=copper-cable] to "upgrade" the [item=motor] already in the [item=burner-inserter].\nSelecting this option disables AAI's rebalancing on logistic science pack.
aaii-cc-drill-mode-default=Select this if this mod should not alter drill recipes.
aaii-cc-drill-mode-no-burner=[item=electric-mining-drill] now has a vanilla-like recipe with [item=electric-motor] replacing [item=electronic-circuit], while [item=burner-mining-drill] is untouched.
aaii-cc-drill-mode-cheap=[item=electric-mining-drill] now has a vanilla-like cost, while (only applies if Lignumis is not present) [item=burner-mining-drill] is altered so that it no longer costs any stone.
